<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebProxy10 | 1画面完結プロキシ</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: Inter, "Noto Sans JP", system-ui, sans-serif;
        background: #0b1020;
        color: #e2e8f0;
        height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      header {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        padding: 12px;
        background: #111a33;
        border-bottom: 1px solid #334155;
      }
      .address {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #475569;
        background: #020617;
        color: #f8fafc;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 0 16px;
        background: #22c55e;
        color: #052e16;
        font-weight: 700;
        cursor: pointer;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: white;
      }
      .hint {
        position: fixed;
        right: 12px;
        bottom: 10px;
        font-size: 12px;
        opacity: .85;
        background: rgba(15,23,42,.7);
        padding: 6px 8px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <header>
      <input id="url" class="address" type="url" placeholder="https://example.com" value="https://example.com" />
      <button id="go">開く</button>
    </header>
    <iframe id="view" allow="autoplay; fullscreen; clipboard-read; clipboard-write"></iframe>
    <div class="hint">注: 一部サイト(CAPTCHA/DRM/銀行系)は仕様上完全再現不可。</div>

    <script>
      const input = document.getElementById("url");
      const go = document.getElementById("go");
      const view = document.getElementById("view");

      const toProxy = (raw) => {
        const url = /^https?:\/\//i.test(raw) ? raw : `https://${raw}`;
        return `/proxy?url=${encodeURIComponent(url)}`;
      };

      const navigate = () => {
        const raw = input.value.trim();
        if (!raw) return;
        view.src = toProxy(raw);
        history.replaceState(null, "", `#${encodeURIComponent(raw)}`);
      };

      go.addEventListener("click", navigate);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") navigate();
      });

      const initial = location.hash ? decodeURIComponent(location.hash.slice(1)) : input.value;
      input.value = initial;
      navigate();
    </script>
  </body>
</html>
